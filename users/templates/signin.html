<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn - E4F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white text-slate-900">

    <div class="max-w-md mx-auto mt-20 px-6 flex flex-col items-center">
        <div class="flex gap-2 mb-12">
            <span class="border-2 border-blue-600 px-3 py-1 text-4xl font-extrabold text-blue-600">E</span>
            <span class="border-2 border-blue-600 px-3 py-1 text-4xl font-extrabold text-blue-600">4</span>
            <span class="border-2 border-blue-600 px-3 py-1 text-4xl font-extrabold text-blue-600">F</span>
        </div>

        <h2 class="text-xl font-bold mb-8 text-center">Enter your email and password to sign in</h2>

        <form action="/signin/" method="post" class="w-full space-y-10">
            {% csrf_token %}

            <div class="django-form-style">
                {{ form.as_p }}
            </div>

            <button class="w-full bg-blue-600 text-white py-3 rounded-sm font-bold hover:bg-blue-700 transition">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-sm w-full text-center">
            <a href="/signup/" class="text-blue-600 font-bold hover:underline">Get help signing in</a>
        </div>
    </div>

    <style>
        .django-form-style p {
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
        }

        .django-form-style label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

        .django-form-style input {
            border: none;
            border-bottom: 2px solid #e2e8f0;
            padding: 10px 0;
            outline: none;
            font-size: 1rem;
        }

        .django-form-style input:focus {
            border-bottom-color: #2563eb;
        }
    </style>
</body>

</html>
