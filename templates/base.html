<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English For Future</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white text-slate-900">


    <nav class="flex justify-between items-center px-7 py-6 max-w-10xl mx-auto">
        <div class="text-3xl font-extrabold text-blue-600 tracking-tighter">
            E4F<span class="text-slate-400"></span>
        </div>

        {% block navbar_links %}
        <div class="hidden md:flex gap-8 font-medium text-slate-600">
            <a href="/" class="hover:text-blue-600">Home</a>
            <a href="/task/" class="hover:text-blue-600">Tasks</a>
            <a href="/courses/" class="hover:text-blue-600">Courses</a>
        </div>
        {% endblock %}

        <div class="flex gap-4 items-center">
            {% block auth_buttons %}
            <a href="/signin/" class="text-slate-600 font-bold hover:text-blue-600 transition">
                Sign in
            </a>

            <a href="/signup/"
                class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                Sign up
            </a>
            {% endblock %}
        </div>
    </nav>

    {% block content %}
    {% endblock %}

</body>

</html>
